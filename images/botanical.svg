  <circle cx="38" cy="86" r="2.5" fill="#8a9e89"/>
  <circle cx="175" cy="170" r="3" fill="#8a9e89"/>
  <circle cx="182" cy="165" r="2" fill="#8a9e89"/>
  <circle cx="60" cy="269" r="2.5" fill="#8a9e89"/>
  <circle cx="178" cy="352" r="3" fill="#8a9e89"/>
  <circle cx="42" cy="505" r="2.5" fill="#8a9e89"/>
  <circle cx="180" cy="595" r="2.5" fill="#8a9e89"/>
